name: Build All Platforms

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:

  # ── Windows x64 ──────────────────────────────────────────────
  windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: "x64"
      - name: Install packages
        run: python -m pip install dnspython pyinstaller pillow --upgrade --quiet
      - name: Build EXE
        run: |
          $addData = ""
          if (Test-Path "MasterDnsVPN.exe") { $addData += ' --add-data "MasterDnsVPN.exe;."' }
          if (Test-Path "MasterDnsVPN")     { $addData += ' --add-data "MasterDnsVPN;."' }
          $cmd = "python -m PyInstaller --onefile --windowed --name KevinNet_Windows_x64 --clean$addData kevinnet.py"
          Invoke-Expression $cmd
      - uses: actions/upload-artifact@v4
        with:
          name: Windows-x64
          path: dist/KevinNet_Windows_x64.exe

  # ── Windows ARM64 ────────────────────────────────────────────
  windows-arm64:
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install packages
        run: python -m pip install dnspython pyinstaller pillow --upgrade --quiet
      - name: Build EXE
        run: |
          $addData = ""
          if (Test-Path "MasterDnsVPN.exe") { $addData += ' --add-data "MasterDnsVPN.exe;."' }
          if (Test-Path "MasterDnsVPN")     { $addData += ' --add-data "MasterDnsVPN;."' }
          $cmd = "python -m PyInstaller --onefile --windowed --name KevinNet_Windows_ARM64 --clean$addData kevinnet.py"
          Invoke-Expression $cmd
      - uses: actions/upload-artifact@v4
        with:
          name: Windows-ARM64
          path: dist/KevinNet_Windows_ARM64.exe

  # ── macOS arm64 (Apple Silicon) ──────────────────────────────
  macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Python + deps
        run: |
          brew install python@3.12 python-tk@3.12
          /opt/homebrew/opt/python@3.12/bin/python3.12 -m venv .venv
          .venv/bin/pip install dnspython pyinstaller pillow --upgrade --quiet
      - name: Build arm64 binary
        run: |
          ADD_DATA=""
          [ -f "MasterDnsVPN"     ] && ADD_DATA="$ADD_DATA --add-data MasterDnsVPN:."
          [ -f "MasterDnsVPN.exe" ] && ADD_DATA="$ADD_DATA --add-data MasterDnsVPN.exe:."
          .venv/bin/python -m PyInstaller \
            --onefile --name KevinNet_arm64 --clean \
            $ADD_DATA kevinnet.py
          # extract from .app bundle if needed
          if [ ! -f "dist/KevinNet_arm64" ] && [ -d "dist/KevinNet_arm64.app" ]; then
            cp "dist/KevinNet_arm64.app/Contents/MacOS/KevinNet_arm64" "dist/KevinNet_arm64"
          fi
          lipo -archs dist/KevinNet_arm64
      - uses: actions/upload-artifact@v4
        with:
          name: macOS-arm64-bin
          path: dist/KevinNet_arm64

  # ── macOS x86_64 (Intel) ─────────────────────────────────────
  macos-x86:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Tkinter
        run: brew install python-tk@3.12
      - name: Install deps
        run: |
          python3 -m venv .venv
          .venv/bin/pip install dnspython pyinstaller pillow --upgrade --quiet
      - name: Build x86_64 binary
        run: |
          ADD_DATA=""
          [ -f "MasterDnsVPN"     ] && ADD_DATA="$ADD_DATA --add-data MasterDnsVPN:."
          [ -f "MasterDnsVPN.exe" ] && ADD_DATA="$ADD_DATA --add-data MasterDnsVPN.exe:."
          .venv/bin/python -m PyInstaller \
            --onefile --name KevinNet_x86_64 --clean \
            $ADD_DATA kevinnet.py
          if [ ! -f "dist/KevinNet_x86_64" ] && [ -d "dist/KevinNet_x86_64.app" ]; then
            cp "dist/KevinNet_x86_64.app/Contents/MacOS/KevinNet_x86_64" "dist/KevinNet_x86_64"
          fi
          lipo -archs dist/KevinNet_x86_64
      - uses: actions/upload-artifact@v4
        with:
          name: macOS-x86-bin
          path: dist/KevinNet_x86_64

  # ── macOS Universal (combine arm64 + x86_64) ─────────────────
  macos-universal:
    needs: [macos-arm64, macos-x86]
    runs-on: macos-latest
    steps:
      - name: Download arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: macOS-arm64-bin
          path: bins/arm64/
      - name: Download x86_64 binary
        uses: actions/download-artifact@v4
        with:
          name: macOS-x86-bin
          path: bins/x86/
      - name: Verify and Combine Universal Binary
        run: |
          echo "=== Downloaded files ==="
          find bins/ -type f | sort
          chmod +x bins/arm64/KevinNet_arm64 bins/x86/KevinNet_x86_64

          echo "=== Verify arm64 arch ==="
          lipo -archs bins/arm64/KevinNet_arm64

          echo "=== Verify x86_64 arch ==="
          lipo -archs bins/x86/KevinNet_x86_64

          echo "=== Combining ==="
          lipo -create             bins/arm64/KevinNet_arm64             bins/x86/KevinNet_x86_64             -output bins/KevinNet_macOS_Universal

          echo "=== Final binary archs (MUST show both) ==="
          lipo -archs bins/KevinNet_macOS_Universal

          # Fail the build if both slices are not present
          ARCHS=$(lipo -archs bins/KevinNet_macOS_Universal)
          if [[ "$ARCHS" != *"arm64"* ]] || [[ "$ARCHS" != *"x86_64"* ]]; then
            echo "ERROR: Universal binary is missing a slice! Got: $ARCHS"
            exit 1
          fi
          echo "SUCCESS: Universal binary contains both arm64 and x86_64"
          ls -lh bins/KevinNet_macOS_Universal
      - uses: actions/upload-artifact@v4
        with:
          name: macOS-Universal
          path: bins/KevinNet_macOS_Universal

  # ── Linux x64 ────────────────────────────────────────────────
  linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install system deps
        run: sudo apt-get install -y python3-tk
      - name: Install packages
        run: python -m pip install dnspython pyinstaller pillow --upgrade --quiet
      - name: Build binary
        run: |
          ADD_DATA=""
          [ -f "MasterDnsVPN"     ] && ADD_DATA="$ADD_DATA --add-data MasterDnsVPN:."
          [ -f "MasterDnsVPN.exe" ] && ADD_DATA="$ADD_DATA --add-data MasterDnsVPN.exe:."
          python -m PyInstaller \
            --onefile --windowed \
            --name KevinNet_Linux_x64 \
            --clean $ADD_DATA kevinnet.py
      - uses: actions/upload-artifact@v4
        with:
          name: Linux-x64
          path: dist/KevinNet_Linux_x64

  # ── Linux ARM64 ──────────────────────────────────────────────
  linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install system deps
        run: sudo apt-get install -y python3-tk
      - name: Install packages
        run: python -m pip install dnspython pyinstaller pillow --upgrade --quiet
      - name: Build binary
        run: |
          ADD_DATA=""
          [ -f "MasterDnsVPN"     ] && ADD_DATA="$ADD_DATA --add-data MasterDnsVPN:."
          [ -f "MasterDnsVPN.exe" ] && ADD_DATA="$ADD_DATA --add-data MasterDnsVPN.exe:."
          python -m PyInstaller \
            --onefile --windowed \
            --name KevinNet_Linux_ARM64 \
            --clean $ADD_DATA kevinnet.py
      - uses: actions/upload-artifact@v4
        with:
          name: Linux-ARM64
          path: dist/KevinNet_Linux_ARM64

  # ── Create GitHub Release ─────────────────────────────────────
  release:
    needs: [windows-x64, windows-arm64, macos-universal, linux-x64, linux-arm64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_files/
      - name: List release files
        run: find release_files/ -type f
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "KevinNet DNS ${{ github.ref_name }}"
          body: |
            ## KevinNet DNS ${{ github.ref_name }}

            Companion tool for [MasterDnsVPN](https://github.com/masterking32/MasterDnsVPN)
            by [Kevin Haji](https://kevinhaji.com)

            ### Download for your platform:

            | Platform | File |
            |---|---|
            | 🪟 Windows x64 | `KevinNet_Windows_x64.exe` |
            | 🪟 Windows ARM64 | `KevinNet_Windows_ARM64.exe` |
            | 🍎 macOS Universal (Intel + Apple Silicon) | `KevinNet_macOS_Universal` |
            | 🐧 Linux x64 | `KevinNet_Linux_x64` |
            | 🐧 Linux ARM64 | `KevinNet_Linux_ARM64` |

            **macOS:** Right-click → Open → Open to bypass Gatekeeper.
            **Linux:** Run `chmod +x KevinNet_Linux_*` first.

            See [README.md](README.md) for full setup and usage instructions.
          files: |
            release_files/Windows-x64/KevinNet_Windows_x64.exe
            release_files/Windows-ARM64/KevinNet_Windows_ARM64.exe
            release_files/macOS-Universal/KevinNet_macOS_Universal
            release_files/Linux-x64/KevinNet_Linux_x64
            release_files/Linux-ARM64/KevinNet_Linux_ARM64
          draft: false
          prerelease: false
